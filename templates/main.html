<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/helix.css?v=17">
<style>
.dash2{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:18px;align-items:start}
@media(max-width:900px){.dash2{grid-template-columns:1fr}}
.control-col{display:flex;flex-direction:column;gap:14px;position:sticky;top:16px}
.results-col{display:flex;flex-direction:column;gap:14px;min-width:0}
.btn-ghost{font-family:var(--disp);font-size:11px;letter-spacing:.06em;color:var(--cyan);background:#000;
  border:1px solid var(--line2);border-radius:6px;padding:8px 12px;cursor:pointer;transition:.15s}
.btn-ghost:hover{border-color:var(--cyan);box-shadow:0 0 10px rgba(40,224,208,.3)}
.results .empty{padding:48px 16px;text-align:center;color:var(--muted)}
/* mode segmented toggle */
.modeseg{display:inline-flex;border:1px solid var(--line2);border-radius:6px;overflow:hidden;margin-bottom:10px;width:100%}
.modeseg .mseg{flex:1;background:transparent;color:var(--muted);border:0;padding:7px 10px;font-family:var(--disp);font-size:11px;letter-spacing:.05em;cursor:pointer;transition:.15s}
.modeseg .mseg.on{background:var(--cyan);color:#001014}
/* faux terminal */
.term{background:#04060a;border:1px solid var(--line2);border-radius:10px;overflow:hidden}
.term-head{font-family:var(--disp);font-size:11px;letter-spacing:.08em;color:var(--purple);padding:9px 13px;border-bottom:1px solid var(--line2);background:#080b12}
.term-head .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cyan);margin-right:8px;vertical-align:1px}
.term-body{font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.7;color:#cfeefe;padding:13px;min-height:150px;max-height:260px;overflow:auto}
.term-body .tl{white-space:pre-wrap}
.tcyan{color:var(--cyan)} .tgrn{color:#5dca7a} .tmut{color:#5b6b86}
.cursor{display:inline-block;width:8px;height:13px;background:var(--cyan);margin-left:3px;vertical-align:-2px;animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="dash2">
    <main class="results-col">
      <div id="terminal-mount"></div>
      <div id="results-mount" class="results"></div>
    </main>
    <aside class="control-col">
      <div id="run-mount" class="panel"></div>
      <div id="abcd-mount" class="panel"></div>
      <div id="maxent-mount" class="panel"></div>
    </aside>
  </div>
</div>
<script src="/static/js/run.js?v=3"></script>
<script src="/static/js/abcd_panel.js?v=3"></script>
<script src="/static/js/maxent_panel.js?v=2"></script>
<script src="/static/js/terminal.js?v=1"></script>
<script src="/static/js/sweep_panel.js?v=1"></script>
<script src="/static/js/results.js?v=5"></script>
<script src="/static/js/dashboard.js?v=4"></script>
</body>
</html>
