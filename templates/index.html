<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>//HELIX · MaxEnt · ABCD · Information Theory</title>
<link rel="icon" href="/favicon.ico?v=5">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/helix.css?v=5">
</head>
<body>
<div class="shell">
  <header class="topheader">
    <div class="brand">
      <div class="logo-frame"><img src="/static/img/max_ent_logo.png?v=5" alt="MaxEnt"></div>
      <div class="title">
        <div class="t">//HELIX</div>
        <div class="s">MAXENT · ABCD · INFORMATION THEORY &mdash; DASHBOARD</div>
      </div>
    </div>
    <div class="actions">
      <a class="repo" href="https://github.com/N-Herling-Mk1" target="_blank" rel="noopener">&#9741; REPO</a>
      <button class="iconbtn" id="btn-reload" title="reload view" aria-label="reload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"/></svg></button>
      <button class="iconbtn" id="btn-settings" title="settings" aria-label="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 12a7.4 7.4 0 0 0-.1-1.1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.9-1.1L14.7 3H9.3l-.4 2.4a7 7 0 0 0-1.9 1.1l-2.3-1-2 3.4 2 1.5a7.4 7.4 0 0 0 0 2.2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.9 1.1l.4 2.4h5.4l.4-2.4a7 7 0 0 0 1.9-1.1l2.3 1 2-3.4-2-1.5c.06-.36.1-.73.1-1.1Z"/></svg></button>
      <button class="iconbtn" id="btn-help" title="help / Q&amp;A" aria-label="help">?</button>
      <div class="popover" id="settings-pop">
        <h4>SETTINGS</h4>
        <div class="row">data &middot; <span style="color:var(--cyan)">data/sample_signal.csv</span></div>
        <div class="row">data &middot; <span style="color:var(--cyan)">data/sample_background.csv</span></div>
        <div class="row" style="margin-top:8px;color:var(--faint)">replace the CSVs in <code>data/</code> with ng02 exports; edit <code>static/data/*.json</code> for references / glossary / Q&amp;A.</div>
      </div>
    </div>
  </header>
  <div class="body">
    <aside class="sidebar">
      <nav class="nav" id="nav">
        <button data-src="/main" class="active">DASHBOARD</button>
        <button data-src="/references">REFERENCES</button>
        <button data-src="/glossary">GLOSSARY</button>
        <button data-src="/qa">Q&amp;A</button>
      </nav>
    </aside>
    <iframe id="view" class="frame" src="/main" title="view"></iframe>
  </div>
</div>
<script>
  const view = document.getElementById('view');
  function setActive(src){document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active', x.dataset.src===src));}
  document.getElementById('nav').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    setActive(b.dataset.src); view.src = b.dataset.src;
  });
  document.getElementById('btn-reload').onclick = ()=>{ try{view.contentWindow.location.reload();}catch(_){const s=view.src;view.src=s;} };
  document.getElementById('btn-help').onclick = ()=>{ setActive('/qa'); view.src='/qa'; };
  const pop = document.getElementById('settings-pop');
  document.getElementById('btn-settings').onclick = e=>{ e.stopPropagation(); pop.classList.toggle('open'); };
  document.addEventListener('click', e=>{ if(!e.target.closest('.actions')) pop.classList.remove('open'); });
</script>
</body>
</html>
